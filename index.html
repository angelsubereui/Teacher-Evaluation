<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Evaluation</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    
    <style>
        body {
            background-color: white;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }
        
        .container { max-width: 400px; }
        
        /* Only this button remains red */
        .btn-red {
            background-color: red;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            font-weight: bold;
        }
        
        .btn-red:hover {
            background-color: #cc0000;
        }

        .result-box {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 class="mb-4 text-center">Evaluation Form</h2>
        
        <div class="mb-3">
            <label class="form-label">Teacher Name</label>
            <input type="text" class="form-control" id="teacherInput" placeholder="Name">
        </div>

        <div class="mb-4">
            <label class="form-label">Rating (0-100)</label>
            <input type="number" class="form-control" id="scoreInput" placeholder="Score">
        </div>

        <button class="btn btn-red" onclick="processEvaluation()">
            Submit
        </button>

        <div id="result" class="result-box"></div>
    </div>

    <script>
        function processEvaluation() {
            const name = document.getElementById('teacherInput').value.trim();
            const score = document.getElementById('scoreInput').value;
            const resultDiv = document.getElementById('result');

            if (name === "" || score === "") {
                resultDiv.innerText = "Please fill in all fields.";
                resultDiv.style.color = "orange";
                return;
            }

            if (score <= 50) {
                resultDiv.innerText =' Teacher ${name}: mahina ka';
                resultDiv.style.color = "red";
            } else {
                resultDiv.innerText =' Teacher ${name}: nice ya';
                resultDiv.style.color = "green";
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
